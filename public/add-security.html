<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Security Personnel</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --danger: #ef4444;
            --success: #22c55e;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        .header {
            margin-bottom: 30px;
            text-align: left;
        }

        .header h1 {
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            margin-top: 5px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .card-title {
            font-weight: 600;
            font-size: 1.25rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        input,
        select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-delete {
            background: #fee2e2;
            color: var(--danger);
            padding: 8px;
            border-radius: 8px;
            width: auto;
            font-size: 0.8rem;
        }

        .btn-delete:hover {
            background: var(--danger);
            color: white;
        }

        .table-container {
            max-height: 500px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #f1f5f9;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            padding: 16px 12px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.95rem;
        }

        .campus-badge {
            background: #f1f5f9;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(4px);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 12px;
            background: #1e293b;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            display: none;
            animation: slideUp 0.3s ease-out;
            z-index: 1000;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .back-link {
            text-decoration: none;
            color: var(--text-muted);
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 20px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--primary);
        }
    </style>
</head>

<body>
    <div class="loading-overlay" id="loader">
        <div class="spinner"></div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="container">
        <a href="admin-dashboard.html" class="back-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back to Dashboard
        </a>

        <div class="header">
            <h1>Manage Security</h1>
            <p>Add and manage security personnel for different campuses.</p>
        </div>

        <div class="grid">
            <!-- Add Security Form -->
            <div class="card">
                <div class="card-title">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary)">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="8.5" cy="7" r="4"></circle>
                        <line x1="20" y1="8" x2="20" y2="14"></line>
                        <line x1="23" y1="11" x2="17" y2="11"></line>
                    </svg>
                    New Personnel
                </div>
                <form id="addSecurityForm">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" placeholder="e.g. Ramesh Reddy" required>
                    </div>
                    <div class="form-group">
                        <label for="campus">Campus</label>
                        <select id="campus" required>
                            <option value="">Select Campus</option>
                            <option value="ECITY_SCHOOL">ECITY SCHOOL</option>
                            <option value="ECITY_NEET_BOYS">ECITY NEET BOYS</option>
                            <option value="ECITY_GIRLS_RESIDENTIAL">ECITY GIRLS RESIDENTIAL</option>
                            <option value="ECITY_ENGG_GIRLS_RESIDENTIAL">ECITY ENGG GIRLS RESIDENTIAL</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="whatsapp">WhatsApp Number</label>
                        <input type="tel" id="whatsapp" placeholder="10-digit mobile number" maxlength="10" required>
                    </div>
                    <button type="submit" class="btn">
                        Add to Database
                    </button>
                </form>
            </div>

            <!-- Security List -->
            <div class="card">
                <div class="card-title">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary)">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    Current Personnel
                </div>
                <div class="table-container">
                    <table id="securityTable">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Campus</th>
                                <th>WhatsApp</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody id="securityList">
                            <!-- Data will be injected here -->
                        </tbody>
                    </table>
                    <div id="noData"
                        style="display: none; text-align: center; padding: 40px; color: var(--text-muted);">
                        No security personnel found.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs (via compatibility layer) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <!-- Config which uses our TiDB Proxy -->
    <script src="js/firebase-config.js"></script>

    <script>
        const loader = document.getElementById('loader');
        const toast = document.getElementById('toast');
        const securityList = document.getElementById('securityList');
        const noData = document.getElementById('noData');
        const form = document.getElementById('addSecurityForm');

        const CAMPUS_NAMES = {
            'ECITY_SCHOOL': 'ECITY SCHOOL',
            'ECITY_NEET_BOYS': 'ECITY NEET BOYS',
            'ECITY_GIRLS_RESIDENTIAL': 'ECITY GIRLS RESIDENTIAL',
            'ECITY_ENGG_GIRLS_RESIDENTIAL': 'ECITY ENGG GIRLS RESIDENTIAL'
        };

        function showToast(message, isError = false) {
            toast.textContent = message;
            toast.style.background = isError ? '#ef4444' : '#1e293b';
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        async function loadSecurity() {
            try {
                loader.style.display = 'flex';
                // Using our proxied 'db' which talks to TiDB backend
                const snapshot = await db.collection('security').get();
                securityList.innerHTML = '';

                if (snapshot.empty) {
                    noData.style.display = 'block';
                    return;
                }

                noData.style.display = 'none';
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const tr = document.createElement('tr');
                    const campusDisplay = CAMPUS_NAMES[data.campus] || data.campus;
                    tr.innerHTML = `
                        <td><strong>${data.name}</strong></td>
                        <td><span class="campus-badge">${campusDisplay}</span></td>
                        <td>${data.whatsappNumber}</td>
                        <td align="right">
                            <button class="btn btn-delete" onclick="deleteSecurity('${doc.id}')">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                            </button>
                        </td>
                    `;
                    securityList.appendChild(tr);
                });
            } catch (error) {
                console.error('Load security error:', error);
                showToast('Load Failed: ' + error.message, true);
            } finally {
                loader.style.display = 'none';
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const campus = document.getElementById('campus').value;
            const whatsapp = document.getElementById('whatsapp').value;

            if (whatsapp.length !== 10) {
                showToast('WhatsApp number must be 10 digits', true);
                return;
            }

            try {
                loader.style.display = 'flex';
                await db.collection('security').add({
                    name,
                    campus,
                    whatsappNumber: whatsapp
                });

                showToast('Successfully added personnel');
                form.reset();
                loadSecurity();
            } catch (error) {
                console.error('Add security error:', error);
                showToast('Failed: ' + error.message, true);
            } finally {
                loader.style.display = 'none';
            }
        });

        async function deleteSecurity(id) {
            if (!confirm('Are you sure you want to remove this person?')) return;

            try {
                loader.style.display = 'flex';
                await db.collection('security').doc(id).delete();
                showToast('Personnel removed');
                loadSecurity();
            } catch (error) {
                console.error(error);
                showToast('Failed to remove personnel', true);
            } finally {
                loader.style.display = 'none';
            }
        }

        // Check authentication
        auth.onAuthStateChanged(user => {
            if (!user) {
                console.warn('⚠️ No user detected, redirecting to admin-login.html');
                window.location.href = 'admin-login.html';
            } else {
                console.log('✅ Authenticated as:', user.email);
                loadSecurity();
            }
        });
    </script>
</body>

</html>
