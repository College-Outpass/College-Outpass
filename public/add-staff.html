<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Staff - Sri Chaitanya</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --danger: #ef4444;
            --success: #22c55e;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        .header {
            margin-bottom: 30px;
            text-align: left;
        }

        .header h1 {
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            margin-top: 5px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .card-title {
            font-weight: 600;
            font-size: 1.25rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        input,
        select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-delete {
            background: #fee2e2;
            color: var(--danger);
            padding: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-delete:hover {
            background: var(--danger);
            color: white;
        }

        .table-container {
            max-height: 500px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #f1f5f9;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            padding: 16px 12px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.95rem;
        }

        .campus-badge {
            background: #f1f5f9;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .role-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .role-staff { background: #e0e7ff; color: #4338ca; }
        .role-admin { background: #fef3c7; color: #92400e; }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 12px;
            background: #1e293b;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            display: none;
            z-index: 2000;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .back-link {
            text-decoration: none;
            color: var(--text-muted);
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 20px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--primary);
        }
    </style>
</head>

<body>
    <div class="loading-overlay" id="loader">
        <div class="spinner"></div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="container">
        <a href="admin-dashboard.html" class="back-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back to Dashboard
        </a>

        <div class="header">
            <h1>Manage Staff</h1>
            <p>Add and manage system access for department staff and campus administrators.</p>
        </div>

        <div class="grid">
            <!-- Add Staff Form -->
            <div class="card">
                <div class="card-title">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary)">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="8.5" cy="7" r="4"></circle>
                        <line x1="20" y1="8" x2="20" y2="14"></line>
                        <line x1="23" y1="11" x2="17" y2="11"></line>
                    </svg>
                    New Staff
                </div>
                <form id="staffForm">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="name" placeholder="e.g. Ramesh Reddy" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" placeholder="staff@srichaitanya.edu" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="Create password" required>
                    </div>
                    <div class="form-group">
                        <label>Campus</label>
                        <select id="campus" required>
                            <option value="">-- Choose Campus --</option>
                            <option value="ECITY_SCHOOL">Ecity - School</option>
                            <option value="ECITY_NEET_BOYS">Ecity - NEET Boys Hostel</option>
                            <option value="ECITY_GIRLS_RESIDENTIAL">Ecity - Girls Residential Campus</option>
                            <option value="ECITY_ENGG_GIRLS_RESIDENTIAL">Ecity - Engg Girls Residential Campus</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Role</label>
                        <select id="role">
                            <option value="staff">Staff (Limited Access)</option>
                            <option value="admin">Admin (Full Access)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn" id="submitBtn">
                        Create Account
                    </button>
                </form>
            </div>

            <!-- Staff List -->
            <div class="card">
                <div class="card-title">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary)">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    Current Staff
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Campus</th>
                                <th align="right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="userList">
                            <!-- Data injected here -->
                        </tbody>
                    </table>
                    <div id="noData" style="display: none; text-align: center; padding: 40px; color: var(--text-muted);">
                        No staff accounts found.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="js/firebase-config.js"></script>

    <script>
        const API_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
            ? 'http://localhost:5000/api'
            : 'https://college-outpass-api.onrender.com/api';

        const loader = document.getElementById('loader');
        const userList = document.getElementById('userList');
        const noData = document.getElementById('noData');
        const staffForm = document.getElementById('staffForm');
        const toast = document.getElementById('toast');

        function showMessage(msg, isError = false) {
            toast.textContent = msg;
            toast.style.background = isError ? '#ef4444' : '#1e293b';
            toast.style.display = 'block';
            if(isError) alert("⚠️ " + msg);
            setTimeout(() => { toast.style.display = 'none'; }, 4000);
        }

        async function fetchUsers() {
            try {
                loader.style.display = 'flex';
                let token = localStorage.getItem('tidb_token') || sessionStorage.getItem('tidb_token');
                
                const res = await fetch(`${API_URL}/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!res.ok) throw new Error('Refresh Login (Token Expired)');
                const users = await res.json();

                if (users.length === 0) {
                    noData.style.display = 'block';
                    userList.innerHTML = '';
                    return;
                }

                noData.style.display = 'none';
                userList.innerHTML = users.map(u => `
                    <tr>
                        <td>
                            <div style="font-weight:600">${u.name || 'Staff'}</div>
                            <div style="font-size:0.75rem;color:var(--text-muted)">${u.email}</div>
                            <span class="role-badge role-${u.role}">${u.role}</span>
                        </td>
                        <td><span class="campus-badge">${(u.campus || 'Global').replace(/_/g, ' ')}</span></td>
                        <td align="right">
                            <div style="display:flex;gap:8px;justify-content:flex-end">
                                <button class="btn-delete" style="background:#f1f5f9;color:#64748b" onclick="resetPassword('${u.uid}', '${u.email}')" title="Reset Password">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3L15.5 7.5z"></path></svg>
                                </button>
                                <button class="btn-delete" onclick="deleteUser('${u.uid}')" title="Delete Account">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                                </button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
                if (err.message.includes('Token')) window.location.href = 'admin-login.html';
            } finally {
                loader.style.display = 'none';
            }
        }

        staffForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                campus: document.getElementById('campus').value,
                role: document.getElementById('role').value
            };

            try {
                loader.style.display = 'flex';
                let token = localStorage.getItem('tidb_token') || sessionStorage.getItem('tidb_token');

                const res = await fetch(`${API_URL}/users`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });

                const result = await res.json();
                if (!res.ok) throw new Error(result.error || 'Creation failed');

                showMessage('🎉 Staff Account Created Successfully!');
                alert('✅ Staff Account Created Successfully!');
                staffForm.reset();
                fetchUsers();
            } catch (err) {
                showMessage(err.message, true);
            } finally {
                loader.style.display = 'none';
            }
        });

        async function deleteUser(uid) {
            if (!confirm('Are you sure you want to delete this staff member?')) return;
            try {
                loader.style.display = 'flex';
                let token = localStorage.getItem('tidb_token') || sessionStorage.getItem('tidb_token');

                const res = await fetch(`${API_URL}/users/${uid}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!res.ok) throw new Error('Delete failed');
                showMessage('🗑️ Account Deleted');
                fetchUsers();
            } catch (err) {
                showMessage(err.message, true);
            } finally {
                loader.style.display = 'none';
            }
        }

        async function resetPassword(uid, email) {
            const newPassword = prompt(`Enter new password for ${email}:`);
            if (!newPassword) return;
            if (newPassword.length < 6) return alert('Password must be at least 6 characters');

            try {
                loader.style.display = 'flex';
                let token = localStorage.getItem('tidb_token') || sessionStorage.getItem('tidb_token');

                const res = await fetch(`${API_URL}/users/${uid}/password`, {
                    method: 'PATCH',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify({ password: newPassword })
                });

                if (!res.ok) throw new Error('Reset failed');
                showMessage('🔐 Password Updated Successfully!');
                alert('✅ Password Reset Complete!');
            } catch (err) {
                showMessage(err.message, true);
            } finally {
                loader.style.display = 'none';
            }
        }

        // Check auth on load
        if (!localStorage.getItem('tidb_token') && !sessionStorage.getItem('tidb_token')) {
            window.location.href = 'admin-login.html';
        } else {
            fetchUsers();
        }
    </script>
    <script>
        // Version check - force refresh
        const CURRENT_VERSION = '2.6';
        const SAVED_VERSION = localStorage.getItem('app_version_staff');
        if (SAVED_VERSION !== CURRENT_VERSION) {
            localStorage.setItem('app_version_staff', CURRENT_VERSION);
            window.location.reload(true);
        }
    </script>
</body>
</html>
