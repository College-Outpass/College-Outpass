<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Staff - Sri Chaitanya</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --danger: #ef4444;
            --success: #22c55e;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        .header {
            margin-bottom: 30px;
            text-align: left;
        }

        .header h1 {
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
        }

        @media (max-width: 850px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .card-title {
            font-weight: 600;
            font-size: 1.25rem;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        input,
        select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            font-family: inherit;
            box-sizing: border-box;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 12px;
            border-bottom: 2px solid #f1f5f9;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        td {
            padding: 16px 12px;
            border-bottom: 1px solid #f1f5f9;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-staff {
            background: #e0e7ff;
            color: #4338ca;
        }

        .badge-admin {
            background: #fef3c7;
            color: #92400e;
        }

        .btn-delete {
            background: #fee2e2;
            color: var(--danger);
            border: none;
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-delete:hover {
            background: var(--danger);
            color: white;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .back-link {
            text-decoration: none;
            color: var(--text-muted);
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        /* Toast Styles */
        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 24px;
            border-radius: 12px;
            background: #1e293b;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            display: none;
            z-index: 2000;
            animation: slideUp 0.3s ease-out;
            font-weight: 600;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>

<body>
    <div class="loading-overlay" id="loader">
        <div class="spinner"></div>
    </div>

    <div id="toast"></div>

    <div class="container">
        <a href="admin-dashboard.html" class="back-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back to Dashboard
        </a>

        <div class="header">
            <h1>Staff Management</h1>
            <p>Create and manage access for department staff and campus administrators.</p>
        </div>

        <div class="grid">
            <div class="card">
                <div class="card-title">Add New Staff</div>
                <form id="staffForm">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="name" placeholder="Name" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" placeholder="staff@srichaitanya.edu" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="Create password" required>
                    </div>
                    <div class="form-group">
                        <label>Campus</label>
                        <select id="campus" required>
                            <option value="">-- Choose Campus --</option>
                            <option value="ECITY_SCHOOL">Ecity - School</option>
                            <option value="ECITY_NEET_BOYS">Ecity - NEET Boys Hostel</option>
                            <option value="ECITY_GIRLS_RESIDENTIAL">Ecity - Girls Residential Campus</option>
                            <option value="ECITY_ENGG_GIRLS_RESIDENTIAL">Ecity - Engg Girls Residential Campus</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Role</label>
                        <select id="role">
                            <option value="staff">Staff (Outpass Access)</option>
                            <option value="admin">Admin (Full Access)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn" id="submitBtn">Create Account</button>
                </form>
            </div>

            <div class="card">
                <div class="card-title">Active Accounts</div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>User</th>
                                <th>Campus</th>
                                <th>Role</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="userList"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>

    <script>
        const API_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
            ? 'http://localhost:5000/api'
            : '/api';

        console.log("📍 Connected to API at:", API_URL);

        const loader = document.getElementById('loader');
        const userList = document.getElementById('userList');
        const staffForm = document.getElementById('staffForm');
        const submitBtn = document.getElementById('submitBtn');
        const toast = document.getElementById('toast');

        function showMessage(msg, isError = false) {
            toast.textContent = msg;
            toast.style.display = 'block';
            toast.style.background = isError ? '#ef4444' : '#22c55e';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 4000);
        }

        async function fetchUsers() {
            try {
                loader.style.display = 'flex';
                // Use firebase-config.js logic to get token
                const user = firebase.auth().currentUser;
                let token = user ? await user.getIdToken() : null;

                if (!token) {
                    const authStr = sessionStorage.getItem('adminAuth') || localStorage.getItem('adminAuth');
                    const adminAuth = authStr ? JSON.parse(authStr) : null;
                    token = adminAuth ? adminAuth.token : localStorage.getItem('tidb_token');
                }

                const res = await fetch(`${API_URL}/users`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!res.ok) throw new Error('Failed to fetch');
                const users = await res.json();

                userList.innerHTML = users.map(u => `
                    <tr>
                        <td>
                            <div style="font-weight:600">${u.name || 'No Name'}</div>
                            <div style="font-size:0.8rem;color:gray">${u.email}</div>
                        </td>
                        <td>${u.campus}</td>
                        <td><span class="badge badge-${u.role}">${u.role}</span></td>
                        <td>
                            <button class="btn-delete" onclick="deleteUser('${u.uid}')">Remove</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                alert('Error: ' + err.message);
            } finally {
                loader.style.display = 'none';
            }
        }

        staffForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                campus: document.getElementById('campus').value,
                role: document.getElementById('role').value
            };

            console.log("🚀 Attempting to create staff:", data.email);

            try {
                loader.style.display = 'flex';
                submitBtn.disabled = true;
                submitBtn.textContent = 'Creating Account...';

                const user = firebase.auth().currentUser;
                let token = user ? await user.getIdToken() : null;

                if (!token) {
                    console.warn("⚠️ No authentication token found. Using default.");
                }

                const res = await fetch(`${API_URL}/users`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                }).catch(err => {
                    console.error("🌐 Network Error:", err);
                    throw new Error("Cannot connect to server at " + API_URL + ". Is the server running?");
                });

                let result;
                try {
                    result = await res.json();
                } catch (e) {
                    result = { error: 'Server returned an invalid response (' + res.status + ')' };
                }

                if (!res.ok) {
                    throw new Error(result.error || result.message || 'Creation failed (Status: ' + res.status + ')');
                }

                console.log("✅ Success:", result);
                showMessage('Account created successfully!');
                staffForm.reset();
                fetchUsers();
            } catch (err) {
                console.error("❌ Error:", err.message);
                showMessage(err.message, true);
            } finally {
                loader.style.display = 'none';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
            }
        });

        async function deleteUser(uid) {
            if (!confirm('Are you sure you want to delete this user?')) return;
            try {
                loader.style.display = 'flex';
                const user = firebase.auth().currentUser;
                let token = user ? await user.getIdToken() : null;
                
                if (!token) {
                    const authStr = sessionStorage.getItem('adminAuth') || localStorage.getItem('adminAuth');
                    const adminAuth = authStr ? JSON.parse(authStr) : null;
                    token = adminAuth ? adminAuth.token : localStorage.getItem('tidb_token');
                }

                const res = await fetch(`${API_URL}/users/${uid}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!res.ok) throw new Error('Delete failed');
                fetchUsers();
            } catch (err) {
                alert(err.message);
            } finally {
                loader.style.display = 'none';
            }
        }

        firebase.auth().onAuthStateChanged(user => {
            if (user || localStorage.getItem('tidb_token')) {
                fetchUsers();
            } else {
                window.location.href = 'admin-login.html';
            }
        });
    </script>
    <script>
        // Version check to force cache busting
        const CURRENT_VERSION = '3.0.6';
        const STORAGE_KEY = 'app_version_add_staff';
        const savedVersion = localStorage.getItem(STORAGE_KEY);
        if (savedVersion && savedVersion !== CURRENT_VERSION) {
            localStorage.setItem(STORAGE_KEY, CURRENT_VERSION);
            window.location.reload(true);
        } else {
            localStorage.setItem(STORAGE_KEY, CURRENT_VERSION);
        }
    </script>
</body>

</html>
