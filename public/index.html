<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sri Chaitanya Educational Institutions - Hostel Outpass System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            min-height: 100vh;
            height: auto;
            overflow-x: hidden;
            overflow-y: auto;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: 
                linear-gradient(rgba(30, 60, 114, 0.85), rgba(42, 82, 152, 0.85)),
                url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=1920&q=80') center/cover fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            background: rgba(255, 255, 255, 0.98);
            padding: 50px 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            text-align: center;
            max-width: 650px;
            width: 100%;
            animation: slideIn 0.6s ease-out;
            border: 3px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            width: auto;
            height: auto;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-inner {
            width: auto;
            height: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-container img {
            width: 160px;
            height: auto;
            max-width: 100%;
            object-fit: contain;
            display: block;
        }

        .logo-fallback {
            font-size: 55px;
            display: none;
        }

        h1 {
            font-size: 2em;
            margin-bottom: 10px;
            color: #1e3c72;
            font-weight: 800;
        }

        .subtitle {
            font-size: 1.2em;
            color: #2a5298;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .location {
            font-size: 0.95em;
            color: #6c757d;
            margin-bottom: 25px;
            font-style: italic;
        }

        p {
            font-size: 1em;
            margin-bottom: 35px;
            color: #495057;
            line-height: 1.6;
        }

        .portal-selection {
            margin-bottom: 35px;
        }

        .portal-heading {
            font-size: 1.1em;
            color: #2c3e50;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .portal-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 10px;
        }

        .btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 25px 20px;
            text-decoration: none;
            border-radius: 15px;
            font-weight: 700;
            font-size: 1.1em;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            gap: 8px;
        }

        .btn-staff {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-staff:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.5);
        }

        .btn-admin {
            background: linear-gradient(135deg, #dc3545, #c82333);
            color: white;
        }

        .btn-admin:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(220, 53, 69, 0.5);
        }

        .btn-icon {
            font-size: 2.5em;
            margin-bottom: 5px;
        }

        .btn-title {
            font-size: 1em;
            font-weight: 700;
        }

        .btn-subtitle {
            font-size: 0.75em;
            opacity: 0.9;
            font-weight: 500;
        }

        .features {
            margin-top: 35px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .feature {
            padding: 15px 10px;
            background: #f8f9fa;
            border-radius: 12px;
            border-left: 4px solid #2a5298;
            transition: transform 0.3s;
        }

        .feature:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .feature-icon {
            font-size: 1.8em;
            margin-bottom: 8px;
        }

        .feature-text {
            font-size: 0.85em;
            color: #495057;
            font-weight: 700;
        }

        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            .container {
                padding: 35px 25px;
            }

            h1 {
                font-size: 1.6em;
            }

            .subtitle {
                font-size: 1.05em;
            }

            .logo-container img {
                width: 120px;
            }

            .logo-fallback {
                font-size: 45px;
            }

            .portal-buttons {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .btn {
                padding: 20px 15px;
            }

            .btn-icon {
                font-size: 2em;
            }

            .btn-title {
                font-size: 0.95em;
            }

            .features {
                grid-template-columns: 1fr;
                gap: 12px;
            }
        }
        
        @media (max-height: 700px) {
            body {
                align-items: flex-start;
                padding-top: 15px;
                padding-bottom: 15px;
            }
            
            .container {
                padding: 30px 25px;
            }
            
            .logo-container img {
                width: 110px;
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <div class="logo-inner">
                <img src="SIRI.png" alt="Sri Chaitanya Logo" onerror="this.style.display='none'; this.parentElement.querySelector('.logo-fallback').style.display='block';">
                <span class="logo-fallback">🎓</span>
            </div>
        </div>
        
        <h1>Sri Chaitanya Educational Institutions</h1>
        <div class="subtitle">Multi-Campus Management System</div>
        <div class="location">📍 Bangalore Campuses</div>
        <p>Secure and Efficient Hostel Outpass Management System</p>
        
        <div class="portal-selection">
            <div class="portal-heading">Select Your Portal</div>
            <div class="portal-buttons">
                <a href="staff-login.html" class="btn btn-staff">
                    <div class="btn-icon">👨‍💼</div>
                    <div class="btn-title">Staff Portal</div>
                    <div class="btn-subtitle">Faculty & Wardens</div>
                </a>
                
                <a href="admin-login.html" class="btn btn-admin">
                    <div class="btn-icon">🔐</div>
                    <div class="btn-title">HOD Portal</div>
                    <div class="btn-subtitle">Head of Department</div>
                </a>
            </div>
        </div>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">🏛️</div>
                <div class="feature-text">Multi-Campus</div>
            </div>
            <div class="feature">
                <div class="feature-icon">📱</div>
                <div class="feature-text">WhatsApp Notify</div>
            </div>
            <div class="feature">
                <div class="feature-icon">📊</div>
                <div class="feature-text">Analytics</div>
            </div>
        </div>
    </div>
<script>
// Version check removed as per user request
localStorage.setItem(STORAGE_KEY, CURRENT_VERSION);

// Force clear cache on load
window.addEventListener('load', function() {
    if (window.performance) {
        if (performance.navigation.type === 1) {
            // Page was reloaded
            console.log('Page was reloaded');
        }
    }
});
</script>
</body>
</html>
