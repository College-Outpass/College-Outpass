<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal User Creator - Super Admin</title>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --bg: #f1f5f9;
        }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); padding: 40px 10px; }
        .creator-card { max-width: 450px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { margin: 0 0 5px 0; font-size: 20px; color: var(--primary); text-align: center; }
        p { text-align: center; color: #64748b; font-size: 13px; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; color: #475569; }
        input, select { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; background: var(--primary); color: white; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn:hover { background: #1e293b; transform: translateY(-1px); }
        .log-container { max-width: 450px; margin: 20px auto; font-size: 12px; }
        .log-item { background: white; padding: 8px 12px; border-radius: 6px; margin-bottom: 5px; border-left: 4px solid #10b981; display: flex; justify-content: space-between; }
        .error { border-left-color: #ef4444; }
    </style>
</head>
<body>
    <div class="creator-card">
        <h1>🛠️ Super Admin Creator <small style="font-size: 10px; opacity: 0.5;">v3.5</small></h1>
        <p>Direct Database & Auth Account Generator</p>

        <form id="uForm">
            <div class="form-group">
                <label>Account Role</label>
                <select id="role" onchange="toggleSecurityFields()">
                    <option value="staff">Staff / HOD</option>
                    <option value="security">Security Personnel</option>
                </select>
            </div>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Full Name" required>
            </div>

            <div class="form-group">
                <label>Login Email</label>
                <input type="email" id="email" placeholder="example@srichaitanya.edu" required>
            </div>

            <div id="secFields" style="display: none;">
                <div class="form-group">
                    <label>WhatsApp Number</label>
                    <input type="tel" id="whatsapp" placeholder="10 Digit Number">
                </div>
            </div>

            <div class="form-group">
                <label>Campus</label>
                <select id="campus">
                    <option value="ECITY_GIRLS_RESIDENTIAL">ECITY_GIRLS_RESIDENTIAL</option>
                    <option value="ECITY_ENGG_GIRLS_RESIDENTIAL">ECITY_ENGG_GIRLS_RESIDENTIAL</option>
                    <option value="ECITY_SCHOOL">ECITY_SCHOOL</option>
                    <option value="ECITY_NEET_BOYS">ECITY_NEET_BOYS</option>
                </select>
            </div>

            <div class="form-group">
                <label>Default Password</label>
                <input type="text" id="pass" value="Outpass@123" required>
            </div>

            <button type="submit" class="btn" id="sBtn">Create Account Now</button>
        </form>
    </div>

    <div class="log-container" id="logs"></div>

    <script>
        const API_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
            ? 'http://localhost:5000/api'
            : 'https://college-outpass-api.onrender.com/api';

        function toggleSecurityFields() {
            const role = document.getElementById('role').value;
            document.getElementById('secFields').style.display = role === 'security' ? 'block' : 'none';
        }

        document.getElementById('uForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('sBtn');
            const role = document.getElementById('role').value;
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value.toLowerCase().trim();
            const campus = document.getElementById('campus').value;
            const password = document.getElementById('pass').value;
            const whatsapp = document.getElementById('whatsapp').value;

            btn.disabled = true;
            btn.textContent = 'Processing...';

            try {
                // Sending request WITHOUT auth token as requested for direct Super Admin use
                const res = await fetch(`${API_URL}/users`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, campus, role, whatsapp_number: whatsapp })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Server rejected creation');

                addLog(`✅ SUCCESS: ${role.toUpperCase()} "${name}" Created & Synced`);
                document.getElementById('uForm').reset();
                document.getElementById('pass').value = 'Outpass@123';
                toggleSecurityFields();
            } catch (err) {
                addLog(`❌ FAILED: ${err.message}`, true);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Create Account Now';
            }
        };

        function addLog(msg, isError = false) {
            const l = document.getElementById('logs');
            const d = document.createElement('div');
            d.className = 'log-item' + (isError ? ' error' : '');
            d.innerHTML = `<span>${msg}</span><span style="opacity: 0.5;">${new Date().toLocaleTimeString()}</span>`;
            l.prepend(d);
        }
    </script>
</body>
</html>
