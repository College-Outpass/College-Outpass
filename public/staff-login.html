<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login - Sri Chaitanya Hostel System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100vh;
            height: auto;
            overflow-x: hidden;
            overflow-y: auto;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:
                linear-gradient(rgba(30, 60, 114, 0.85), rgba(42, 82, 152, 0.85)),
                url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=1920&q=80') center/cover fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.98);
            padding: 45px 40px;
            border-radius: 20px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 0.6s ease-out;
            border: 3px solid rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            width: auto;
            height: auto;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-inner {
            width: auto;
            height: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-container img {
            width: 140px;
            height: auto;
            max-width: 100%;
            object-fit: contain;
            display: block;
        }

        .logo-fallback {
            font-size: 45px;
            display: none;
        }

        h1 {
            color: #1e3c72;
            margin-bottom: 8px;
            font-size: 26px;
            font-weight: 800;
        }

        .subtitle {
            color: #6c757d;
            margin-bottom: 35px;
            font-size: 14px;
            font-weight: 600;
        }

        .institution-name {
            color: #2a5298;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 25px;
            padding: 10px 18px;
            background: #f0f4ff;
            border-radius: 8px;
            border-left: 4px solid #2a5298;
        }

        .form-group {
            margin-bottom: 22px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #495057;
            font-weight: 700;
            font-size: 14px;
        }

        input,
        select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e1e5eb;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
            background: #f8f9fa;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #2a5298;
            background: white;
            box-shadow: 0 0 0 4px rgba(42, 82, 152, 0.1);
        }

        input:disabled,
        select:disabled {
            background: #e9ecef;
            color: #6c757d;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-primary {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(30, 60, 114, 0.4);
            margin-top: 10px;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(30, 60, 114, 0.6);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            background: linear-gradient(135deg, #999, #777);
        }

        .btn-admin-portal {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #dc3545, #c82333);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(220, 53, 69, 0.4);
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-admin-portal:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(220, 53, 69, 0.6);
        }

        .btn-admin-portal:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: linear-gradient(135deg, #999, #777);
        }

        .btn-main-portal {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.4);
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-main-portal:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(40, 167, 69, 0.6);
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
            display: none;
            text-align: left;
            font-size: 14px;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #28a745;
            display: none;
            text-align: left;
            font-size: 14px;
        }

        .footer-text {
            margin-top: 25px;
            color: #6c757d;
            font-size: 13px;
        }

        .portal-divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #6c757d;
            font-size: 13px;
        }

        .portal-divider::before,
        .portal-divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid #dee2e6;
        }

        .portal-divider span {
            padding: 0 15px;
        }

        .loader {
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255, 255, 255, .3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 500px) {
            body {
                padding: 15px;
            }

            .login-box {
                padding: 30px 25px;
            }

            h1 {
                font-size: 22px;
            }

            .institution-name {
                font-size: 16px;
            }

            .logo-container img {
                width: 110px;
            }
        }

        @media (max-height: 700px) {
            body {
                align-items: flex-start;
                padding-top: 15px;
                padding-bottom: 15px;
            }

            .login-box {
                padding: 30px 25px;
            }

            .logo-container img {
                width: 100px;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo-container">
                <div class="logo-inner">
                    <img id="logoImage" alt="Sri Chaitanya Logo" onerror="this.onerror=null; tryNextLogo(this);">
                    <div class="logo-fallback" id="logoFallback" style="display: none;">🏫</div>
                </div>
            </div>

            <h1>Staff Portal</h1>
            <p class="subtitle">Hostel Management System</p>
            <div class="institution-name">SRI CHAITANYA EDUCATIONAL INSTITUTIONS</div>

            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="campus">Select Campus *</label>
                    <select id="campus" required>
                        <option value="">-- Choose Campus --</option>
                        <option value="ECITY_SCHOOL">Ecity - School</option>
                        <option value="ECITY_NEET_BOYS">Ecity - NEET Boys Hostel</option>
                        <option value="ECITY_GIRLS_RESIDENTIAL">Ecity - Girls Residential Campus</option>
                        <option value="ECITY_ENGG_GIRLS_RESIDENTIAL">Ecity - Engg Girls Residential Campus</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="email">Staff Email ID *</label>
                    <input type="email" id="email" placeholder="Enter your staff email" required disabled>
                </div>

                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" placeholder="Enter your password" required disabled>
                </div>

                <button type="submit" class="btn-primary" id="loginBtn" disabled>
                    <span id="loginText">Login to Dashboard</span>
                    <span id="loginLoader" class="loader" style="display: none;"></span>
                </button>
            </form>

            <button type="button" class="btn-admin-portal" id="adminPortalBtn" disabled>
                <span>🔐</span>
                <span>Principal Admin Portal</span>
            </button>

            <div class="portal-divider">
                <span>ADMIN ACCESS</span>
            </div>

            <button type="button" class="btn-main-portal" id="mainPortalBtn">
                <span>👨‍💼</span>
                <span>ADMIN (HOD) Portal - Main Page</span>
            </button>

            <p class="footer-text">© 2024 Sri Chaitanya Educational Institutions</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js?v=2.4"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFHwulhuw9NlGQi0DWzy9mU47RSO5TUkw",
            authDomain: "college-out-pass-system-62552.firebaseapp.com",
            projectId: "college-out-pass-system-62552",
            storageBucket: "college-out-pass-system-62552.firebasestorage.app",
            messagingSenderId: "71169367861",
            appId: "1:71169367861:web:7105b401d52c049476f67c"
        };

        // Use the Bridge or Initialize fresh
        const auth = window.auth || firebase.auth();
        const db = window.db || firebase.firestore();

        // Logo fallback chain - tries multiple sources
        const logoSources = [
            'SIRI.png',  // Local file
            'https://via.placeholder.com/90/1e3c72/ffffff?text=SC',  // CDN fallback
        ];

        let currentLogoIndex = 0;

        function tryNextLogo(imgElement) {
            currentLogoIndex++;
            const logoFallback = document.getElementById('logoFallback');

            if (currentLogoIndex < logoSources.length) {
                // Try next source
                imgElement.src = logoSources[currentLogoIndex];
                console.log(`Trying logo source ${currentLogoIndex + 1}: ${logoSources[currentLogoIndex]}`);
            } else {
                // All sources failed, show emoji fallback
                console.log('All logo sources failed, showing emoji fallback');
                imgElement.style.display = 'none';
                logoFallback.style.display = 'block';
            }
        }

        // Load logo - Try local first, then Firestore, then CDN fallback
        async function loadLogoFromFirestore() {
            const logoImage = document.getElementById('logoImage');
            const logoFallback = document.getElementById('logoFallback');

            // Start with first source in the chain
            currentLogoIndex = 0;
            logoImage.style.display = 'block';
            logoFallback.style.display = 'none';
            logoImage.src = logoSources[0];

            // Optionally try to load custom logo from Firestore (if available)
            try {
                const logoDoc = await db.collection('settings').doc('logo').get();

                if (logoDoc.exists) {
                    const logoData = logoDoc.data();
                    const logoUrl = logoData.url;

                    if (logoUrl && logoUrl.trim() !== '') {
                        console.log('Loading custom logo from Firestore:', logoUrl);

                        // Pre-validate the Firestore logo URL
                        const customImg = new Image();
                        customImg.onload = function () {
                            // Firestore logo is valid, use it
                            logoImage.src = logoUrl;
                            console.log('✅ Custom logo loaded from Firestore');
                        };
                        customImg.onerror = function () {
                            console.log('❌ Custom logo from Firestore failed, keeping current logo');
                            // Keep whatever logo is currently showing
                        };
                        customImg.src = logoUrl;
                    }
                }
            } catch (error) {
                console.log('Firestore logo check failed, using fallback chain:', error.message);
                // Continue with fallback chain (already started)
            }
        }

        // Hardcoded mappings removed in favor of TiDB DB verification

        // CRITICAL FLAG: Prevent auto-redirect when user is actively trying to login
        let isLoggingIn = false;

        document.addEventListener('DOMContentLoaded', function () {
            console.log("Page loaded. Checking authentication state...");

            // Load logo from Firestore
            loadLogoFromFirestore();

            // Event listener for Main Portal Button
            document.getElementById('mainPortalBtn').addEventListener('click', function () {
                console.log("Redirecting to admin login page for ADMIN(HOD)");
                window.location.href = 'admin-login.html';
            });

            // Only redirect if user is already authenticated AND not in the middle of logging in
            auth.onAuthStateChanged((user) => {
                // CRITICAL: Always check if user explicitly logged out
                const explicitLogout = sessionStorage.getItem('explicitLogout') === 'true';

                if (user && !isLoggingIn && !explicitLogout) {
                    console.log("User already authenticated:", user.email);

                    const savedCampus = localStorage.getItem('userCampus');
                    const lastDashboard = localStorage.getItem('lastDashboard');
                    const isPrincipal = localStorage.getItem('isPrincipal') === 'true';

                    console.log("Auto-redirect check:", {
                        savedCampus,
                        lastDashboard,
                        isPrincipal,
                        email: user.email,
                        isLoggingIn,
                        explicitLogout
                    });

                    // Only redirect if we have saved data (user was logged in before)
                    if (savedCampus && lastDashboard) {
                        // Give 500ms delay to ensure clean redirect
                        setTimeout(() => {
                            if (lastDashboard === 'admin' && isPrincipal) {
                                console.log("Auto-redirecting to ADMIN dashboard");
                                window.location.replace('staff-admin-dashboard.html');
                            } else if (lastDashboard === 'staff' && !isPrincipal) {
                                console.log("Auto-redirecting to STAFF dashboard");
                                window.location.replace('dashboard.html');
                            }
                        }, 500);
                    }
                } else if (explicitLogout) {
                    // Clear the explicit logout flag
                    sessionStorage.removeItem('explicitLogout');
                    console.log("Explicit logout detected - forcing fresh login");
                }
            });

            document.getElementById('campus').addEventListener('change', function () {
                const emailField = document.getElementById('email');
                const passwordField = document.getElementById('password');
                const loginBtn = document.getElementById('loginBtn');
                const adminBtn = document.getElementById('adminPortalBtn');

                if (this.value) {
                    emailField.disabled = false;
                    passwordField.disabled = false;
                    loginBtn.disabled = false;
                    adminBtn.disabled = false;
                    emailField.focus();
                } else {
                    emailField.disabled = true;
                    passwordField.disabled = true;
                    loginBtn.disabled = true;
                    adminBtn.disabled = true;
                }
            });

            document.getElementById('loginForm').addEventListener('submit', handleStaffLogin);
            document.getElementById('adminPortalBtn').addEventListener('click', handleAdminLogin);
            document.getElementById('campus').focus();
        });

        async function handleStaffLogin(e) {
            e.preventDefault();
            isLoggingIn = true;

            const campus = document.getElementById('campus').value;
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;

            if (!campus || !email || !password) {
                showMessage('Please fill all fields', 'error');
                isLoggingIn = false;
                return;
            }

            const loginText = document.getElementById('loginText');
            const loginLoader = document.getElementById('loginLoader');
            loginText.style.display = 'none';
            loginLoader.style.display = 'block';
            document.getElementById('loginBtn').disabled = true;
            hideMessages();

            try {
                const API_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
                    ? 'http://localhost:5000/api'
                    : 'https://college-outpass-api.onrender.com/api';

                // Step 1: Sign in with Database API directly
                console.log('Authenticating with Database...');
                const loginResponse = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, campus })
                });

                const loginResult = await loginResponse.json();

                if (!loginResponse.ok) {
                    throw new Error(loginResult.error || loginResult.code || 'Login failed');
                }

                const token = loginResult.token;
                const userData = loginResult.user;

                console.log('✅ Database Login successful!');

                // Step 2: Set local storage with verified data
                localStorage.clear();
                localStorage.setItem('tidb_token', token);
                localStorage.setItem('userCampus', userData.campus);
                localStorage.setItem('userEmail', userData.email);
                localStorage.setItem('lastDashboard', 'staff');
                localStorage.setItem('isPrincipal', userData.role === 'admin' ? 'true' : 'false');

                showMessage('✅ Login successful! Redirecting...', 'success');

                setTimeout(() => {
                    window.location.replace('dashboard.html');
                }, 1000);

            } catch (error) {
                console.error('Login error:', error);
                showMessage('❌ ' + error.message, 'error');
                loginText.style.display = 'inline';
                loginLoader.style.display = 'none';
                document.getElementById('loginBtn').disabled = false;
                isLoggingIn = false;
            }
        }

        async function handleAdminLogin() {
            isLoggingIn = true;

            const campus = document.getElementById('campus').value;
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;

            if (!campus || !email || !password) {
                showMessage('Please fill all fields', 'error');
                isLoggingIn = false;
                return;
            }

            const adminBtn = document.getElementById('adminPortalBtn');
            adminBtn.innerHTML = '<span class="loader"></span> Verifying...';
            adminBtn.disabled = true;
            hideMessages();

            try {
                const API_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
                    ? 'http://localhost:5000/api'
                    : 'https://college-outpass-api.onrender.com/api';

                // Step 1: Sign in with Database API directly
                console.log('Authenticating Admin with Database...');
                const loginResponse = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, campus })
                });

                const loginResult = await loginResponse.json();

                if (!loginResponse.ok) {
                    throw new Error(loginResult.error || loginResult.code || 'Admin login failed');
                }

                if (loginResult.user.role !== 'admin') {
                    throw new Error('This account does not have Admin access');
                }

                const token = loginResult.token;
                const userData = loginResult.user;

                // TiDB LOGIN SUCCESS
                localStorage.clear();
                localStorage.setItem('tidb_token', token);
                localStorage.setItem('userCampus', userData.campus);
                localStorage.setItem('userEmail', userData.email);
                localStorage.setItem('isPrincipal', 'true');
                localStorage.setItem('lastDashboard', 'admin');

                showMessage('✅ Admin login successful!', 'success');

                setTimeout(() => {
                    window.location.replace('staff-admin-dashboard.html');
                }, 1000);

            } catch (error) {
                console.error('Admin login error:', error);
                showMessage('❌ ' + error.message, 'error');
                adminBtn.innerHTML = '<span>🔐</span><span>Principal Admin Portal</span>';
                adminBtn.disabled = false;
                isLoggingIn = false;
            }
        }

        function showMessage(message, type) {
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');

            if (type === 'error') {
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
            } else {
                successDiv.textContent = message;
                successDiv.style.display = 'block';
                errorDiv.style.display = 'none';
            }
        }

        function hideMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }
    </script>
    <script>
        // Version check - update this version number when you deploy
        const CURRENT_VERSION = '2.5';
        const STORAGE_KEY = 'app_version';

        // Check if user has old cached version
        const savedVersion = localStorage.getItem(STORAGE_KEY);
        if (savedVersion && savedVersion !== CURRENT_VERSION) {
            if (confirm('New update available! Click OK to reload and get the latest features.')) {
                localStorage.setItem(STORAGE_KEY, CURRENT_VERSION);
                window.location.reload(true);
            }
        } else {
            localStorage.setItem(STORAGE_KEY, CURRENT_VERSION);
        }

        // Force clear cache on load
        window.addEventListener('load', function () {
            if (window.performance) {
                if (performance.navigation.type === 1) {
                    // Page was reloaded
                    console.log('Page was reloaded');
                }
            }
        });
        // Logout functionality for staff login page
        document.getElementById('logoutBtn').addEventListener('click', function () {
            // Set explicit logout flag
            sessionStorage.setItem('explicitLogout', 'true');

            // Clear all stored data
            localStorage.clear();
            sessionStorage.clear();

            // Sign out from Firebase
            auth.signOut().then(() => {
                window.location.href = 'staff-login.html';
            });
        });
    </script>
</body>

</html>
